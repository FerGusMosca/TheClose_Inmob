<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TheClose{% endblock %} — Inmobiliaria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/base.css">
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- SIDEBAR NAV -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-mark">TC</div>
            <div class="brand-text">
                <span class="brand-the">The</span>
                <span class="brand-close">Close</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-label">Principal</div>
            <a href="/" class="nav-item {% block nav_dashboard %}{% endblock %}">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                </span>
                <span>Dashboard</span>
            </a>
            <a href="/properties" class="nav-item {% block nav_propiedades %}{% endblock %}">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M3 9.5L12 3l9 6.5V21a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
                        <path d="M9 22V12h6v10"/>
                    </svg>
                </span>
                <span>Propiedades</span>
            </a>
            <a href="/busqueda" class="nav-item {% block nav_busqueda %}{% endblock %}">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="11" cy="11" r="7"/>
                        <path d="M21 21l-4.35-4.35"/>
                    </svg>
                </span>
                <span>Búsqueda IA</span>
                <span class="nav-badge">Beta</span>
            </a>

            <div class="nav-section-label" style="margin-top: 2rem;">Gestión</div>
            <a href="/alquileres" class="nav-item {% block nav_alquileres %}{% endblock %}">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
                        <rect x="9" y="3" width="6" height="4" rx="1"/>
                        <path d="M9 12h6M9 16h4"/>
                    </svg>
                </span>
                <span>Alquileres</span>
            </a>
            <a href="/temporarios" class="nav-item {% block nav_temporarios %}{% endblock %}">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <path d="M16 2v4M8 2v4M3 10h18"/>
                    </svg>
                </span>
                <span>Temporarios</span>
            </a>

            <div class="nav-section-label" style="margin-top: 2rem;">Análisis</div>
            <a href="/reportes" class="nav-item {% block nav_reportes %}{% endblock %}">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M3 3v18h18"/>
                        <path d="M7 16l4-4 4 4 4-6"/>
                    </svg>
                </span>
                <span>Reportes</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-footer-city">
                <span class="city-dot"></span>
                CABA, Argentina
            </div>
        </div>
    </aside>

    <!-- TOPBAR -->
    <header class="topbar">
        <button class="sidebar-toggle" id="sidebarToggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 12h18M3 6h18M3 18h18"/>
            </svg>
        </button>
        <div class="topbar-title">{% block page_title %}Dashboard{% endblock %}</div>
        <div class="topbar-right">
            <div class="topbar-date" id="topbarDate"></div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/base.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
